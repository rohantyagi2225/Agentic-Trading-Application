services:
  - type: web
    name: agentictrading-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
